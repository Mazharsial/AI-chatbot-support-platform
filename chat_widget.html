<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Support Chat Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .demo-page {
    text-align: center;
    color: #666;
    font-size: 18px;
  }

  .demo-page h1 { color: #333; margin-bottom: 8px; }

  /* ── Chat Button ── */
  #chat-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 60px;
    height: 60px;
    background: #2563eb;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(37,99,235,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 1000;
  }
  #chat-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 24px rgba(37,99,235,0.5);
  }
  #chat-btn svg { width: 28px; height: 28px; fill: white; }

  /* Unread badge */
  #unread-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #ef4444;
    color: white;
    font-size: 11px;
    font-weight: 700;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    border: 2px solid white;
  }

  /* ── Chat Window ── */
  #chat-window {
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 360px;
    height: 520px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.15);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 999;
    animation: slideUp 0.25s ease;
  }
  #chat-window.open { display: flex; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .chat-header {
    background: #2563eb;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bot-avatar {
    width: 38px;
    height: 38px;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .bot-info { flex: 1; }
  .bot-name  { color: white; font-weight: 600; font-size: 15px; }
  .bot-status {
    color: rgba(255,255,255,0.8);
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .status-dot {
    width: 7px;
    height: 7px;
    background: #4ade80;
    border-radius: 50%;
  }
  .close-btn {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    opacity: 0.8;
    font-size: 20px;
    line-height: 1;
  }
  .close-btn:hover { opacity: 1; background: rgba(255,255,255,0.15); }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: #f8fafc;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }

  .msg {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-wrap: break-word;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .msg.bot {
    background: white;
    color: #1e293b;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    align-self: flex-start;
  }
  .msg.user {
    background: #2563eb;
    color: white;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
  }

  /* Typing indicator */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: white;
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    align-self: flex-start;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .typing-indicator span {
    width: 7px;
    height: 7px;
    background: #94a3b8;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-6px); }
  }

  /* Quick replies */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 16px 8px;
    background: #f8fafc;
  }
  .qr-btn {
    background: white;
    border: 1.5px solid #2563eb;
    color: #2563eb;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .qr-btn:hover { background: #2563eb; color: white; }

  /* Input */
  .chat-input-area {
    padding: 12px 16px;
    background: white;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #msg-input {
    flex: 1;
    border: 1.5px solid #e2e8f0;
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 14px;
    outline: none;
    resize: none;
    max-height: 80px;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: #2563eb; }
  #send-btn {
    width: 40px;
    height: 40px;
    background: #2563eb;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, background 0.15s;
  }
  #send-btn:hover    { background: #1d4ed8; transform: scale(1.05); }
  #send-btn:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
  #send-btn svg { width: 18px; height: 18px; fill: white; }

  /* Connection status */
  #conn-status {
    text-align: center;
    font-size: 12px;
    color: #94a3b8;
    padding: 4px;
    background: #f8fafc;
  }
</style>
</head>
<body>

<div class="demo-page">
  <h1>Your Website</h1>
  <p>The AI support chat widget is in the bottom-right corner</p>
</div>

<!-- Chat Button -->
<button id="chat-btn" onclick="toggleChat()">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
  <div id="unread-badge">1</div>
</button>

<!-- Chat Window -->
<div id="chat-window">
  <div class="chat-header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <div class="bot-name">AI Support</div>
      <div class="bot-status">
        <div class="status-dot"></div>
        Online — typically replies instantly
      </div>
    </div>
    <button class="close-btn" onclick="toggleChat()">×</button>
  </div>

  <div id="messages"></div>
  <div id="conn-status">Connecting...</div>

  <div class="quick-replies" id="quick-replies">
    <button class="qr-btn" onclick="sendQuick('Track my order')">Track order</button>
    <button class="qr-btn" onclick="sendQuick('I want a refund')">Refund</button>
    <button class="qr-btn" onclick="sendQuick('Business hours')">Hours</button>
    <button class="qr-btn" onclick="sendQuick('Talk to human')">Human agent</button>
  </div>

  <div class="chat-input-area">
    <textarea id="msg-input" placeholder="Type your message..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const SERVER = "ws://localhost:8000";
  const sessionId = "web_" + Math.random().toString(36).substr(2, 9);

  let ws = null;
  let isOpen = false;
  let connected = false;
  let typingEl = null;

  function toggleChat() {
    isOpen = !isOpen;
    const win = document.getElementById("chat-window");
    win.classList.toggle("open", isOpen);
    document.getElementById("unread-badge").style.display = "none";
    if (isOpen && !ws) connectWS();
    if (isOpen) setTimeout(() => document.getElementById("msg-input").focus(), 100);
  }

  function connectWS() {
    const url = `${SERVER}/chat/ws/${sessionId}`;
    ws = new WebSocket(url);
    document.getElementById("conn-status").textContent = "Connecting...";

    ws.onopen = () => {
      connected = true;
      document.getElementById("conn-status").textContent = "";
      document.getElementById("send-btn").disabled = false;
      console.log("WebSocket connected");
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);
      removeTyping();
      if (data.type === "typing") {
        showTyping();
      } else if (data.type === "message" && data.sender === "bot") {
        addMessage(data.message, "bot");
        if (!isOpen) {
          document.getElementById("unread-badge").style.display = "flex";
        }
      }
    };

    ws.onerror = () => {
      document.getElementById("conn-status").textContent =
        "Connection failed — make sure the server is running";
      document.getElementById("send-btn").disabled = true;
    };

    ws.onclose = () => {
      connected = false;
      document.getElementById("send-btn").disabled = true;
      document.getElementById("conn-status").textContent =
        "Disconnected — refresh to reconnect";
    };
  }

  function sendMessage() {
    const input = document.getElementById("msg-input");
    const text  = input.value.trim();
    if (!text || !connected) return;
    addMessage(text, "user");
    ws.send(JSON.stringify({ message: text }));
    input.value = "";
    input.style.height = "auto";
    document.getElementById("send-btn").disabled = true;
    setTimeout(() => {
      if (connected) document.getElementById("send-btn").disabled = false;
    }, 500);
  }

  function sendQuick(text) {
    if (!connected) { if (!ws) connectWS(); return; }
    addMessage(text, "user");
    ws.send(JSON.stringify({ message: text }));
  }

  function addMessage(text, sender) {
    const msgs = document.getElementById("messages");
    const div  = document.createElement("div");
    div.className = `msg ${sender}`;
    div.textContent = text;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function showTyping() {
    if (typingEl) return;
    const msgs = document.getElementById("messages");
    typingEl = document.createElement("div");
    typingEl.className = "typing-indicator";
    typingEl.innerHTML = "<span></span><span></span><span></span>";
    msgs.appendChild(typingEl);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removeTyping() {
    if (typingEl) { typingEl.remove(); typingEl = null; }
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 80) + "px";
  }

  // Show unread badge after 3 seconds to draw attention
  setTimeout(() => {
    if (!isOpen) document.getElementById("unread-badge").style.display = "flex";
  }, 3000);
</script>
</body>
</html>
